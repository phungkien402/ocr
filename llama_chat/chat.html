<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3-VL Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

.header { padding: 12px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 15px; font-weight: 700; }
.header .model { font-size: 11px; color: #64748b; background: #0f172a; padding: 2px 8px; border-radius: 10px; }
.status { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
.status.off { background: #ef4444; }

.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.msg { display: flex; gap: 10px; max-width: 80%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.msg.user .avatar { background: #3b82f6; }
.msg.assistant .avatar { background: #7c3aed; }

.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg.user .bubble { background: #1d4ed8; border-radius: 12px 2px 12px 12px; }
.msg.assistant .bubble { background: #1e293b; border: 1px solid #334155; border-radius: 2px 12px 12px 12px; }
.msg.assistant .bubble.thinking { color: #94a3b8; font-style: italic; font-size: 13px; }

.bubble img { max-width: 240px; border-radius: 8px; margin-top: 6px; display: block; }

.typing { display: flex; gap: 4px; padding: 14px; align-items: center; }
.typing span { width: 6px; height: 6px; background: #64748b; border-radius: 50%; animation: bounce .8s infinite; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

.input-area { padding: 16px 20px; background: #1e293b; border-top: 1px solid #334155; }

.preview-bar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.preview-item { position: relative; }
.preview-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; border: 2px solid #334155; }
.preview-item .remove { position: absolute; top: -4px; right: -4px; background: #ef4444; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-row textarea { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; resize: none; height: 44px; max-height: 120px; outline: none; font-family: inherit; }
.input-row textarea:focus { border-color: #3b82f6; }

.btn-icon { width: 44px; height: 44px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; transition: background .15s; }
.btn-upload { background: #334155; color: #94a3b8; }
.btn-upload:hover { background: #475569; }
.btn-send { background: #3b82f6; color: white; }
.btn-send:hover { background: #2563eb; }
.btn-send:disabled { background: #1e3a5f; color: #475569; cursor: not-allowed; }
.btn-clear { background: #334155; color: #94a3b8; font-size: 14px; }
.btn-clear:hover { background: #475569; }

input[type=file] { display: none; }
.endpoint-bar { font-size: 11px; color: #475569; margin-bottom: 8px; }
.endpoint-bar input { background: transparent; border: none; color: #64748b; font-size: 11px; width: 260px; outline: none; }
</style>
</head>
<body>

<div class="header">
  <div class="status" id="statusDot"></div>
  <h1>Qwen3-VL Chat</h1>
  <span class="model" id="modelLabel">llama-server</span>
  <span style="flex:1"></span>
  <button class="btn-icon btn-clear" onclick="clearChat()" title="Xóa chat">🗑</button>
</div>

<div class="messages" id="messages">
  <div class="msg assistant">
    <div class="avatar">🤖</div>
    <div class="bubble">Xin chào! Tôi là Qwen3-VL. Bạn có thể gửi ảnh và đặt câu hỏi tự do.</div>
  </div>
</div>

<div class="input-area">
  <div class="endpoint-bar">
    Endpoint: <input id="endpoint" value="http://localhost:8080/v1/chat/completions">
  </div>
  <div class="preview-bar" id="previewBar"></div>
  <div class="input-row">
    <button class="btn-icon btn-upload" onclick="document.getElementById('fileInput').click()" title="Upload ảnh">📎</button>
    <textarea id="msgInput" placeholder="Nhập tin nhắn..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="autoResize(this)"></textarea>
    <button class="btn-icon btn-send" id="sendBtn" onclick="send()">➤</button>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple onchange="addImages(this.files)">
</div>

<script>
const ENDPOINT = () => document.getElementById('endpoint').value;
let history = [];
let pendingImages = []; // [{b64, dataUrl}]

// Check server status
async function checkStatus() {
  try {
    const r = await fetch(ENDPOINT().replace('/v1/chat/completions', '/health'));
    document.getElementById('statusDot').className = r.ok ? 'status' : 'status off';
    if (r.ok) {
      const d = await r.json();
      document.getElementById('modelLabel').textContent = d.model || 'llama-server';
    }
  } catch { document.getElementById('statusDot').className = 'status off'; }
}
checkStatus();
setInterval(checkStatus, 5000);

// Image handling
const MAX_DIM = 1024; // match pipeline setting

function resizeImage(file, maxDim) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else       { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        resolve({ b64: dataUrl.split(',')[1], dataUrl, origSize: `${img.width}×${img.height}`, newSize: `${w}×${h}` });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function addImages(files) {
  for (const file of files) {
    const result = await resizeImage(file, MAX_DIM);
    if (result.origSize !== result.newSize)
      console.log(`Resized: ${result.origSize} → ${result.newSize}`);
    pendingImages.push(result);
    renderPreviews();
  }
  document.getElementById('fileInput').value = '';
}

function renderPreviews() {
  const bar = document.getElementById('previewBar');
  bar.innerHTML = pendingImages.map((img, i) => `
    <div class="preview-item">
      <img src="${img.dataUrl}">
      <button class="remove" onclick="removeImg(${i})">×</button>
    </div>`).join('');
}

function removeImg(i) {
  pendingImages.splice(i, 1);
  renderPreviews();
}

function autoResize(el) {
  el.style.height = '44px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Chat
async function send() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && pendingImages.length === 0) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  // Build user message content
  const content = [];
  if (text) content.push({ type: 'text', text });
  for (const img of pendingImages) {
    content.push({ type: 'image_url', image_url: { url: `data:image/jpeg;base64,${img.b64}` } });
  }

  // Show user message
  const userBubble = content.map(c =>
    c.type === 'text' ? c.text : `<img src="${c.image_url.url}">`
  ).join('\n');
  appendMsg('user', userBubble, true);

  // Add to history
  history.push({ role: 'user', content: content.length === 1 && content[0].type === 'text'
    ? text
    : content
  });

  // Reset
  input.value = '';
  input.style.height = '44px';
  pendingImages = [];
  renderPreviews();

  // Typing indicator
  const typingId = appendTyping();

  try {
    const resp = await fetch(ENDPOINT(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'local',
        messages: history,
        temperature: 0.7,
        max_tokens: 1024,
        stream: false,
      })
    });

    removeTyping(typingId);

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '(không có response)';

    history.push({ role: 'assistant', content: reply });
    appendMsg('assistant', reply);

  } catch(e) {
    removeTyping(typingId);
    appendMsg('assistant', `❌ Lỗi: ${e.message}`);
  }

  btn.disabled = false;
  input.focus();
}

function appendMsg(role, html, isHtml = false) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
    <div class="bubble">${isHtml ? html : escHtml(html)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function appendTyping() {
  const msgs = document.getElementById('messages');
  const id = 'typing_' + Date.now();
  const div = document.createElement('div');
  div.id = id;
  div.className = 'msg assistant';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function clearChat() {
  history = [];
  pendingImages = [];
  renderPreviews();
  document.getElementById('messages').innerHTML = `
    <div class="msg assistant">
      <div class="avatar">🤖</div>
      <div class="bubble">Chat đã được xóa. Bắt đầu lại!</div>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
